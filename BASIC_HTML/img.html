        <h1>Imagenes</h1>
        <p>Utilizan la etiqueta <b>&lt img &gt</b>, con atributo src, que es la <a href="rutas.html">ruta</a> y alt, que es el texto que se muestra si la imagen no esta disponible en la ruta asignada.</p>
        <h2>Ejemplo de imagenes insertadas:</h2>
        <h3>HOLA, MI PRIMERA IMAGEN INSERTADA EN UNA PAGINA WEB</h3>
        <img src="../../Imagenes/amor_emo.jpg" alt="nosotros" title="hola te amo">
        <h3>Prueba de alt</h3>
        <img src="ruta" alt="nosotros" title="alt de la imagen">

        <br>
